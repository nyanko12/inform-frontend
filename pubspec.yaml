name: oshirasekun
description: 日用品が無くなるタイミングをリマインドするアプリ「お知らせくん」

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # HTTP
  dio: ^5.4.3+1

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  firebase_messaging: ^15.1.0

  # Auth providers
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1

  # Calendar
  table_calendar: ^3.1.2

  # Barcode scanner
  mobile_scanner: ^5.2.3

  # Image
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#FFFDF8"
    theme_color: "#8FBFCF"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
